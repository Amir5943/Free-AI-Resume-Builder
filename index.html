<!DOCTYPE html>
<html>
<head>
<title>AI Resume Builder</title>
<style>
body {
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container {
background:white;
padding:20px;
max-width:500px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea {
width:100%;
padding:10px;
margin:10px 0;
}

button {
background:#4CAF50;
color:white;
padding:10px;
border:none;
cursor:pointer;
}

#resume {
margin-top:20px;
background:#eee;
padding:15px;
}
</style>
</head>

<body>

<div class="container">
<h2>AI Resume Builder</h2>

<input id="name" placeholder="Your Name">
<input id="job" placeholder="Job Title">
<textarea id="skills" placeholder="Skills"></textarea>

<button onclick="generate()">Generate Resume</button>

<div id="resume"></div>
</div>

<script>
function generate(){
let name=document.getElementById("name").value;
let job=document.getElementById("job").value;
let skills=document.getElementById("skills").value;

document.getElementById("resume").innerHTML=
"<h3>"+name+"</h3>"+
"<p><b>Job:</b> "+job+"</p>"+
"<p><b>Skills:</b> "+skills+"</p>";
}
</script>

</body>
</html>
