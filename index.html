<!DOCTYPE html>
<html>
<head>
<title>AmirAI Resume Builder</title>

<style>
body{
font-family: Arial;
background:#f5f7fb;
text-align:center;
}

.container{
background:white;
padding:40px;
width:600px;
margin:auto;
margin-top:80px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
font-size:32px;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2ecc71;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.resume{
background:#f1f1f1;
padding:20px;
margin-top:20px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>AmirAI Resume Builder</h1>
<p>Create a professional resume in seconds</p>

<input id="name" placeholder="Your Name">
<input id="job" placeholder="Job Title">
<textarea id="skills" placeholder="Skills"></textarea>

<button onclick="generate()">Generate Resume</button>

<div class="resume" id="output"></div>

</div>

<script>

function generate(){
let name=document.getElementById("name").value;
let job=document.getElementById("job").value;
let skills=document.getElementById("skills").value;

document.getElementById("output").innerHTML=
"<h2>"+name+"</h2>"+
"<p><b>Job:</b> "+job+"</p>"+
"<p><b>Skills:</b> "+skills+"</p>";
}

</script>

</body>
</html>
